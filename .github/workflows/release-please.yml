name: release-please

on:
  push:
    branches:
      - newmain

env:
  TARGET_BRANCH: newmain
  MANIFEST: .release-please-manifest.json
  CONFIG_IN: release-please-config.json
  CONFIG_LINKED: release-please-config.linked.json
  RELEASE_PLEASE_VERSION: "17.6.0"
  NUGET_SOURCE: https://nuget.pkg.github.com/Visma-SmartSkill/index.json

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Fetch target branch
        run: git fetch origin "${TARGET_BRANCH}"

      - name: Prepare release-please config
        id: prepare
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail

          git branch -f "${TARGET_BRANCH}" HEAD

          probe_log="${RUNNER_TEMP}/release-please-probe.log"
          npx --yes "release-please@${RELEASE_PLEASE_VERSION}" release-pr \
            --repo-url="${REPO_URL}" \
            --target-branch="${TARGET_BRANCH}" \
            --config-file="${CONFIG_IN}" \
            --manifest-file="${MANIFEST}" \
            --token="${GITHUB_TOKEN}" \
            --dry-run \
            --local \
            --local-path=. \
            > "${probe_log}" 2>&1
          cat "${probe_log}"

          sync_major=false
          config_file="${CONFIG_IN}"

          if ! grep -q 'Would open 0 pull requests' "${probe_log}"; then
            while IFS= read -r summary; do
              [ -n "${summary}" ] || continue
              version="${summary##*: }"
              version="${version%</summary>}"
              if [[ "${version}" == *.0.0 ]]; then
                sync_major=true
                break
              fi
            done < <(grep -oE '<summary>[^<]+</summary>' "${probe_log}" || true)
          fi

          if [ "${sync_major}" = true ]; then
            echo "Major bump (*.0.0) detected — using linked-versions config."
            config_file="${CONFIG_LINKED}"
          else
            echo "No major bump — using independent per-package config."
          fi

          echo "sync_major=${sync_major}" >> "${GITHUB_OUTPUT}"
          echo "config_file=${config_file}" >> "${GITHUB_OUTPUT}"

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: ${{ env.TARGET_BRANCH }}
          config-file: ${{ steps.prepare.outputs.config_file }}
          manifest-file: ${{ env.MANIFEST }}

  publish-nuget:
    runs-on: ubuntu-latest
    needs: release-please
    if: >-
      needs.release-please.outputs.releases_created == 'true' &&
      needs.release-please.outputs.paths_released != '[]' &&
      needs.release-please.outputs.paths_released != ''
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release-please.outputs.paths_released) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: ga

      - name: Add NuGet source
        shell: bash
        run: |
          dotnet nuget remove source GithubVSS 2>/dev/null || true
          dotnet nuget add source "${NUGET_SOURCE}" \
            --name GithubVSS \
            --username github \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Build and push ${{ matrix.package }}
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail
          project="${PACKAGE}/${PACKAGE}.csproj"
          out_dir="${GITHUB_WORKSPACE}/${PACKAGE}/nupkg"
          mkdir -p "${out_dir}"

          dotnet restore "${project}"
          dotnet build "${project}" \
            --configuration Release \
            --no-restore \
            /p:GeneratePackageOnBuild=true \
            /p:PackageOutputPath="${out_dir}" \
            /p:IncludeSymbols=false

          shopt -s nullglob
          files=("${out_dir}/"*.nupkg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .nupkg in ${out_dir}. Searching..."
            find "${PACKAGE}" -name '*.nupkg' -not -path '*/bin/Debug/*' || true
            exit 1
          fi

          for file in "${files[@]}"; do
            echo "Pushing ${file}"
            dotnet nuget push "${file}" \
              --skip-duplicate \
              --source "${NUGET_SOURCE}" \
              --api-key "${{ secrets.GITHUB_TOKEN }}"
          done
