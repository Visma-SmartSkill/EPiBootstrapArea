name: nuget-prerelease

on:
  pull_request:
    branches:
      - newmain

env:
  TARGET_BRANCH: newmain
  MANIFEST: .release-please-manifest.json
  CONFIG_IN: release-please-config.json
  NUGET_SOURCE: https://nuget.pkg.github.com/Visma-SmartSkill/index.json

jobs:
  plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      packages: ${{ steps.plan.outputs.packages }}
      package_versions: ${{ steps.plan.outputs.versions }}
      has_packages: ${{ steps.plan.outputs.has_packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: Plan packages and versions
        id: plan
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          set -euo pipefail

          analyze_bump() {
            local log="$1"
            if [ -z "${log}" ]; then echo "none"; return; fi
            if grep -qE '(^[^ ]+(\([^)]+\))?!:)|(BREAKING CHANGE:)' <<< "${log}"; then echo "major"; return; fi
            if grep -qE '^feat(\([^)]+\))?!:' <<< "${log}"; then echo "major"; return; fi
            if grep -qE '^feat(\([^)]+\))?:' <<< "${log}"; then echo "minor"; return; fi
            if grep -qE '^fix(\([^)]+\))?!:' <<< "${log}"; then echo "major"; return; fi
            if grep -qE '^fix(\([^)]+\))?:' <<< "${log}"; then echo "patch"; return; fi
            if grep -qE '^perf(\([^)]+\))?!:' <<< "${log}"; then echo "major"; return; fi
            if grep -qE '^perf(\([^)]+\))?:' <<< "${log}"; then echo "patch"; return; fi
            echo "none"
          }

          bump_version() {
            local version="$1" bump="$2"
            local major minor patch
            IFS='.' read -r major minor patch <<< "${version}"
            patch="${patch%%[^0-9]*}"
            case "${bump}" in
              major) echo "$((major + 1)).0.0" ;;
              minor) echo "${major}.$((minor + 1)).0" ;;
              patch) echo "${major}.${minor}.$((patch + 1))" ;;
              *) echo "${version}" ;;
            esac
          }

          base_sha="$(git merge-base HEAD "origin/${TARGET_BRANCH}")"
          sync_major=false
          global_max="none"

          declare -A bumps=()
          declare -A versions=()

          while IFS= read -r pkg; do
            log="$(git log --format='%s%n%b' "${base_sha}..HEAD" -- "${pkg}")"
            bump="$(analyze_bump "${log}")"
            bumps["${pkg}"]="${bump}"
            case "${global_max}:${bump}" in
              major:*|*:major) global_max="major" ;;
              minor:*|*:minor) global_max="minor" ;;
              patch:*|*:patch) global_max="patch" ;;
            esac
          done < <(jq -r 'keys[]' "${MANIFEST}")

          if [ "${global_max}" = "major" ]; then
            sync_major=true
          fi

          if [ "${sync_major}" = true ]; then
            echo "Breaking change in PR — all packages will major-bump."
            while IFS= read -r pkg; do
              current="$(jq -r --arg p "${pkg}" '.[$p]' "${MANIFEST}")"
              versions["${pkg}"]="$(bump_version "${current}" major)"
            done < <(jq -r 'keys[]' "${MANIFEST}")
          else
            while IFS= read -r pkg; do
              bump="${bumps[$pkg]:-none}"
              if [ "${bump}" != "none" ]; then
                current="$(jq -r --arg p "${pkg}" '.[$p]' "${MANIFEST}")"
                versions["${pkg}"]="$(bump_version "${current}" "${bump}")"
              fi
            done < <(jq -r 'keys[]' "${MANIFEST}")
          fi

          packages=()
          versions_json='{}'
          while IFS= read -r pkg; do
            if [ -n "${versions[$pkg]:-}" ]; then
              packages+=("${pkg}")
              versions_json="$(jq -c --arg p "${pkg}" --arg v "${versions[$pkg]}" \
                '. + {($p): $v}' <<< "${versions_json}")"
            fi
          done < <(jq -r 'keys[]' "${MANIFEST}")

          if [ "${#packages[@]}" -gt 0 ]; then
            packages_json="$(jq -nc '$ARGS.positional' --args "${packages[@]}")"
            echo "has_packages=true" >> "${GITHUB_OUTPUT}"
          else
            packages_json='[]'
            echo "has_packages=false" >> "${GITHUB_OUTPUT}"
          fi

          echo "packages=${packages_json}" >> "${GITHUB_OUTPUT}"
          echo "versions=${versions_json}" >> "${GITHUB_OUTPUT}"
          echo "Planned packages: ${packages_json}"
          echo "Planned versions: ${versions_json}"

  build:
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.plan.outputs.packages) }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: ga

      - name: Build and pack ${{ matrix.package }}
        shell: bash
        env:
          PACKAGE_VERSIONS: ${{ needs.plan.outputs.package_versions }}
        run: |
          set -euo pipefail
          project="${{ matrix.package }}/${{ matrix.package }}.csproj"
          out_dir="${GITHUB_WORKSPACE}/artifacts/${{ matrix.package }}"
          version="$(jq -r --arg p "${{ matrix.package }}" '.[$p]' <<< "${PACKAGE_VERSIONS}")"
          version="${version}-beta.${{ github.event.pull_request.number }}"
          mkdir -p "${out_dir}"
          echo "Building ${project} as ${version}"

          dotnet restore "${project}"
          dotnet build "${project}" \
            --configuration Release \
            --no-restore \
            /p:GeneratePackageOnBuild=true \
            /p:PackageOutputPath="${out_dir}" \
            /p:IncludeSymbols=false \
            /p:Version="${version}" \
            /p:PackageVersion="${version}"

          shopt -s nullglob
          files=("${out_dir}/"*.nupkg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .nupkg in ${out_dir}. Searching..."
            find "${{ matrix.package }}" -name '*.nupkg' -not -path '*/bin/Debug/*' || true
            exit 1
          fi
          ls -la "${out_dir}/"*.nupkg

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nuget-beta-${{ matrix.package }}
          path: artifacts/${{ matrix.package }}/
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - plan
      - build
    if: needs.plan.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.plan.outputs.packages) }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download NuGet artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: nuget-beta-${{ matrix.package }}
          path: artifacts/${{ matrix.package }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: ga

      - name: Add NuGet source
        shell: bash
        run: |
          dotnet nuget remove source GithubVSS 2>/dev/null || true
          dotnet nuget add source "${NUGET_SOURCE}" \
            --name GithubVSS \
            --username github \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text

      - name: Push ${{ matrix.package }}
        shell: bash
        env:
          PACKAGE: ${{ matrix.package }}
        run: |
          set -euo pipefail
          pkg_dir="${GITHUB_WORKSPACE}/artifacts/${PACKAGE}"
          shopt -s nullglob
          files=("${pkg_dir}/"*.nupkg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No NuGet packages found in ${pkg_dir}"
            ls -laR "${pkg_dir}" || true
            exit 1
          fi
          for file in "${files[@]}"; do
            echo "Pushing ${file}"
            dotnet nuget push "${file}" \
              --skip-duplicate \
              --source "${NUGET_SOURCE}" \
              --api-key "${{ secrets.GITHUB_TOKEN }}"
          done
